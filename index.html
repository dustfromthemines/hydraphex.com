<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYDRAPHEX</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas#bg {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
}
.overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}
.overlay iframe {
  pointer-events: auto;
  border: none;
  max-width: 100%;
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="overlay">
  <iframe width="540" height="305" src="https://307c970a.sibforms.com/serve/MUIFADxvXPEg1TgONnD2wQbr0EJLKNy8k4Ay3TODAWSw2c6MEa4qOXvDMD5QP1o5rL_kuS-Y_pP6BqA2d_9ovgYerdkP70l-A-5TWjgA6mae6ZjO0CYdNNyxNmLbOPGM9jOnqQ2eTBvmJqu6xAy3vEVbRjlb-b9Cpq4UEFO2Oa829C2ZiaIUNwp7rK0woFC2fhQyuXuYkqNxQjUpUA==" frameborder="0" scrolling="auto" allowfullscreen style="display:block;max-width:100%;"></iframe>
</div>
<script>
const canvas = document.getElementById('bg');
const gl = canvas.getContext('webgl', { alpha: false, antialias: true });

let mouse = { x: 0.5, y: 0.5, targetX: 0.5, targetY: 0.5 };

document.addEventListener('mousemove', e => {
  mouse.targetX = e.clientX / window.innerWidth;
  mouse.targetY = e.clientY / window.innerHeight;
});

document.addEventListener('touchmove', e => {
  mouse.targetX = e.touches[0].clientX / window.innerWidth;
  mouse.targetY = e.touches[0].clientY / window.innerHeight;
}, { passive: true });

const vsrc = `
attribute vec2 a_pos;
varying vec2 v_uv;
void main() {
  v_uv = a_pos * 0.5 + 0.5;
  gl_Position = vec4(a_pos, 0.0, 1.0);
}`;

const fsrc = `
precision highp float;
varying vec2 v_uv;
uniform sampler2D u_tex;
uniform float u_time;
uniform vec2 u_mouse;
uniform vec2 u_resolution;
uniform vec2 u_texsize;

vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }

float snoise(vec2 v) {
  const vec4 C = vec4(0.211324865405187, 0.366025403784439,
                      -0.577350269189626, 0.024390243902439);
  vec2 i  = floor(v + dot(v, C.yy));
  vec2 x0 = v - i + dot(i, C.xx);
  vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
  vec4 x12 = x0.xyxy + C.xxzz;
  x12.xy -= i1;
  i = mod289(i);
  vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0))
                           + i.x + vec3(0.0, i1.x, 1.0));
  vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
  m = m*m; m = m*m;
  vec3 x = 2.0 * fract(p * C.www) - 1.0;
  vec3 h = abs(x) - 0.5;
  vec3 ox = floor(x + 0.5);
  vec3 a0 = x - ox;
  m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
  vec3 g;
  g.x = a0.x * x0.x + h.x * x0.y;
  g.yz = a0.yz * x12.xz + h.yz * x12.yw;
  return 130.0 * dot(m, g);
}

void main() {
  vec2 uv = v_uv;
  float screenAspect = u_resolution.x / u_resolution.y;
  float texAspect = u_texsize.x / u_texsize.y;
  
  // Cover: scale UVs so image fills viewport, cropping excess
  vec2 coverUV = uv;
  if (screenAspect > texAspect) {
    float scale = texAspect / screenAspect;
    coverUV.y = uv.y * scale + (1.0 - scale) * 0.5;
  } else {
    float scale = screenAspect / texAspect;
    coverUV.x = uv.x * scale + (1.0 - scale) * 0.5;
  }
  
  float aspect = screenAspect;
  
  float t = u_time * 0.3;
  
  vec2 mc = u_mouse - uv;
  float mdist = length(mc);
  float minfluence = smoothstep(0.5, 0.0, mdist) * 0.015;
  
  float n1 = snoise(vec2(uv.x * 1.5 + t * 0.4, uv.y * 1.5 + t * 0.3));
  float n2 = snoise(vec2(uv.x * 1.5 - t * 0.3, uv.y * 1.5 + t * 0.5));
  float n3 = snoise(vec2(uv.x * 3.0 + t * 0.7, uv.y * 3.0 - t * 0.6)) * 0.5;
  float n4 = snoise(vec2(uv.x * 3.0 - t * 0.5, uv.y * 4.0 + t * 0.8)) * 0.5;
  float n5 = snoise(vec2(uv.x * 6.0 + t * 1.2, uv.y * 6.0 + t * 0.9)) * 0.25;
  float n6 = snoise(vec2(uv.x * 8.0 - t * 1.0, uv.y * 7.0 - t * 1.1)) * 0.15;
  
  vec2 center = vec2(0.5, 0.48);
  float logoD = length((uv - center) * vec2(1.2, 1.0));
  float mask = smoothstep(0.12, 0.35, logoD);
  float logoMask = mix(0.05, 1.0, mask);
  
  float distortStrength = 0.028;
  vec2 distort = vec2(
    (n1 + n3 + n5) * distortStrength,
    (n2 + n4 + n6) * distortStrength
  );
  
  distort += mc * minfluence;
  distort *= logoMask;
  
  vec2 distorted_uv = clamp(coverUV + distort, 0.001, 0.999);
  
  vec4 color = texture2D(u_tex, distorted_uv);
  
  float caustic1 = snoise(vec2(uv.x * 5.0 + t * 0.8, uv.y * 5.0 - t * 0.6));
  float caustic2 = snoise(vec2(uv.x * 7.0 - t * 0.7, uv.y * 6.0 + t * 0.9));
  float causticPattern = pow(abs(caustic1 + caustic2) * 0.5, 2.0);
  
  vec3 waterTint = vec3(0.7, 0.85, 1.0);
  color.rgb = mix(color.rgb, color.rgb * waterTint, 0.15 * mask);
  
  color.rgb += vec3(0.6, 0.75, 0.9) * causticPattern * 0.07 * mask;
  
  float vig = 1.0 - smoothstep(0.3, 0.85, length((uv - 0.5) * vec2(aspect, 1.0)));
  color.rgb *= mix(0.65, 1.0, vig);
  
  float caStr = (0.003 + causticPattern * 0.002) * mask;
  vec2 caDir = normalize(uv - 0.5 + 0.001) * caStr;
  float r = texture2D(u_tex, distorted_uv + caDir).r;
  float b = texture2D(u_tex, distorted_uv - caDir).b;
  color.r = mix(color.r, r, 0.4);
  color.b = mix(color.b, b, 0.4);
  
  gl_FragColor = color;
}`;

function createShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

const vs = createShader(gl.VERTEX_SHADER, vsrc);
const fs = createShader(gl.FRAGMENT_SHADER, fsrc);
const prog = gl.createProgram();
gl.attachShader(prog, vs);
gl.attachShader(prog, fs);
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const uTime = gl.getUniformLocation(prog, 'u_time');
const uMouse = gl.getUniformLocation(prog, 'u_mouse');
const uRes = gl.getUniformLocation(prog, 'u_resolution');
const uTex = gl.getUniformLocation(prog, 'u_tex');
const uTexSize = gl.getUniformLocation(prog, 'u_texsize');

const tex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, tex);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array([0,0,0,255]));

const img = new Image();
img.crossOrigin = 'anonymous';
img.onload = () => {
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
  gl.uniform2f(uTexSize, img.naturalWidth, img.naturalHeight);
  render();
};
img.src = './hydraphex.webp';

function resize() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  gl.viewport(0, 0, canvas.width, canvas.height);
}

window.addEventListener('resize', resize);
resize();

function render() {
  mouse.x += (mouse.targetX - mouse.x) * 0.03;
  mouse.y += (mouse.targetY - mouse.y) * 0.03;
  gl.uniform1f(uTime, performance.now() * 0.001);
  gl.uniform2f(uMouse, mouse.x, mouse.y);
  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform1i(uTex, 0);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(render);
}
</script>
</body>
</html>
