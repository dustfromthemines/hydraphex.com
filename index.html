<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYDRAPHEX</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0c10}
canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;display:flex;align-items:center;justify-content:center;pointer-events:none;flex-direction:column;gap:24px}
.signup-form{pointer-events:auto;display:flex;flex-direction:column;align-items:center;gap:16px}
.form-row{display:flex;gap:10px;align-items:center}
.form-row input[type="email"]{
  width:150px;
  padding:10px 16px;
  font-size:14px;
  font-family:'Futura','Futura-Medium',sans-serif;
  color:#000;
  background:rgba(255,255,255,0.2);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:6px;
  outline:none;
  transition:border-color .3s, background .3s;
}
.form-row input[type="email"]::placeholder{color:rgba(0,0,0,0.5)}
.form-row input[type="email"]:focus{border-color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.28)}
.form-row button{
  padding:10px 24px;
  font-size:13px;
  font-family:'Futura','Futura-Medium',sans-serif;
  font-weight:500;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:#fff;
  background:rgba(0,0,0,0.25);
  border:1px solid rgba(0,0,0,0.15);
  border-radius:6px;
  cursor:pointer;
  transition:background .3s, border-color .3s;
}
.form-row button:hover{background:rgba(0,0,0,0.4)}
.form-row button:active{transform:scale(0.97)}
.form-msg{font-family:'Futura','Futura-Medium',sans-serif;font-size:13px;min-height:18px;text-align:center;transition:opacity .3s;opacity:0}
</style>
</head>

var canvas = document.getElementById("bg");
var gl = canvas.getContext("webgl",{alpha:false,antialias:true});
var mouseX=0.5,mouseY=0.5,mx=0.5,my=0.5,texW=1,texH=1;

document.addEventListener("mousemove",function(e){mx=e.clientX/window.innerWidth;my=e.clientY/window.innerHeight});
document.addEventListener("touchmove",function(e){mx=e.touches[0].clientX/window.innerWidth;my=e.touches[0].clientY/window.innerHeight},{passive:true});

var VS="attribute vec2 p;varying vec2 v;void main(){v=vec2(p.x*.5+.5,1.-(p.y*.5+.5));gl_Position=vec4(p,0,1);}";

var FS=`precision highp float;
varying vec2 v;
uniform sampler2D tex;
uniform float time;
uniform vec2 mouse,res,ts;
uniform vec3 ripple1;
uniform vec3 ripple2;

vec3 m3(vec3 x){return x-floor(x*(1./289.))*289.;}
vec2 m2(vec2 x){return x-floor(x*(1./289.))*289.;}
vec3 pm(vec3 x){return m3(((x*34.)+1.)*x);}

float sn(vec2 v){
  vec4 C=vec4(.2113,.3660,-.5774,.0244);
  vec2 i=floor(v+dot(v,C.yy)),x0=v-i+dot(i,C.xx);
  vec2 i1=x0.x>x0.y?vec2(1,0):vec2(0,1);
  vec4 x12=x0.xyxy+C.xxzz;x12.xy-=i1;i=m2(i);
  vec3 p=pm(pm(i.y+vec3(0,i1.y,1))+i.x+vec3(0,i1.x,1));
  vec3 m=max(.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.);
  m=m*m;m=m*m;
  vec3 x=2.*fract(p*C.www)-1.,h=abs(x)-.5,ox=floor(x+.5),a0=x-ox;
  m*=1.7928-0.8537*(a0*a0+h*h);
  vec3 g;g.x=a0.x*x0.x+h.x*x0.y;g.yz=a0.yz*x12.xz+h.yz*x12.yw;
  return 130.*dot(m,g);
}

void main(){
  vec2 uv=v;
  float sa=res.x/max(res.y,1.);
  float ta=ts.x/max(ts.y,1.);

  // COVER: scale image to fill entire screen
  vec2 cuv=uv;
  if(sa>ta){
    float s=ta/sa;
    cuv.y=uv.y*s+(1.-s)*.5;
  }else{
    float s=sa/ta;
    cuv.x=uv.x*s+(1.-s)*.5;
  }

  float t=time*.15;
  float breath=.7+.3*sin(time*1.0);
  vec2 mc=mouse-uv;
  float md=length(mc);
  float mi=smoothstep(.5,0.,md)*.015;

  float n1=sn(vec2(uv.x*1.5+t*.4,uv.y*1.5+t*.3));
  float n2=sn(vec2(uv.x*1.5-t*.3,uv.y*1.5+t*.5));
  float n3=sn(vec2(uv.x*3.+t*.7,uv.y*3.-t*.6))*.5;
  float n4=sn(vec2(uv.x*3.-t*.5,uv.y*4.+t*.8))*.5;
  float n5=sn(vec2(uv.x*6.+t*1.2,uv.y*6.+t*.9))*.25;
  float n6=sn(vec2(uv.x*8.-t,uv.y*7.-t*1.1))*.15;

  vec2 ctr=vec2(.5,.48);
  float ld=length((uv-ctr)*vec2(1.2,1.));
  float mask=smoothstep(.12,.35,ld);
  float lm=mix(.05,1.,mask);

  vec2 d=vec2((n1+n3+n5)*.028,(n2+n4+n6)*.028)*breath;
  d+=mc*mi;

  // Pebble ripples
  for(int i=0;i<2;i++){
    vec3 rp=i==0?ripple1:ripple2;
    float prog=rp.z;
    if(prog>0.&&prog<1.){
      vec2 ro=rp.xy;
      float dist=length(uv-ro);
      float radius=prog*prog*2.8;
      float ring=dist-radius;
      float wave=sin(ring*12.-.5)*0.008;
      float trailing=sin(ring*8.+1.)*0.004;
      float envelope=exp(-abs(ring)*4.)*smoothstep(-.02,.04,ring*-1.+.15);
      float trailEnv=exp(-abs(ring+.08)*3.);
      float life=smoothstep(0.,.15,prog)*(1.-prog*prog*prog);
      vec2 dir=normalize(uv-ro+.0001);
      d+=dir*(wave*envelope+trailing*trailEnv)*life;
    }
  }

  d*=lm;

  vec2 duv=clamp(cuv+d,.001,.999);
  vec4 c=texture2D(tex,duv);

  float c1=sn(vec2(uv.x*5.+t*.8,uv.y*5.-t*.6))*breath;
  float c2=sn(vec2(uv.x*7.-t*.7,uv.y*6.+t*.9))*breath;
  float cp=pow(abs(c1+c2)*.5,2.);

  c.rgb=mix(c.rgb,c.rgb*vec3(.7,.85,1.),.15*mask);
  c.rgb+=vec3(.6,.75,.9)*cp*.07*mask;

  float vig=1.-smoothstep(.3,.85,length((uv-.5)*vec2(sa,1.)));
  c.rgb*=mix(.65,1.,vig);

  float ca=(0.003+cp*.002)*mask;
  vec2 cd=normalize(uv-.5+.001)*ca;
  c.r=mix(c.r,texture2D(tex,duv+cd).r,.4);
  c.b=mix(c.b,texture2D(tex,duv-cd).b,.4);

  gl_FragColor=c;
}`;

function cs(t,s){var sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS)){console.error(gl.getShaderInfoLog(sh));return null}return sh}

var pr=gl.createProgram();
gl.attachShader(pr,cs(gl.VERTEX_SHADER,VS));
gl.attachShader(pr,cs(gl.FRAGMENT_SHADER,FS));
gl.linkProgram(pr);
if(!gl.getProgramParameter(pr,gl.LINK_STATUS))console.error(gl.getProgramInfoLog(pr));
gl.useProgram(pr);

var b=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,b);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
var ap=gl.getAttribLocation(pr,"p");
gl.enableVertexAttribArray(ap);
gl.vertexAttribPointer(ap,2,gl.FLOAT,false,0,0);

var uT=gl.getUniformLocation(pr,"time");
var uM=gl.getUniformLocation(pr,"mouse");
var uR=gl.getUniformLocation(pr,"res");
var uX=gl.getUniformLocation(pr,"tex");
var uS=gl.getUniformLocation(pr,"ts");
var uR1=gl.getUniformLocation(pr,"ripple1");
var uR2=gl.getUniformLocation(pr,"ripple2");

var tx=gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D,tx);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,1,1,0,gl.RGBA,gl.UNSIGNED_BYTE,new Uint8Array([10,12,16,255]));

var img=new Image();
img.onload=function(){
  gl.bindTexture(gl.TEXTURE_2D,tx);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,img);
  texW=img.naturalWidth;texH=img.naturalHeight;
  console.log("Loaded:",texW,"x",texH);
};
img.onerror=function(){console.error("Image load failed")};
img.src=IMG_DATA;

function resize(){
  var d=window.devicePixelRatio||1;
  canvas.width=window.innerWidth*d;
  canvas.height=window.innerHeight*d;
  gl.viewport(0,0,canvas.width,canvas.height);
}
window.addEventListener("resize",resize);
resize();

// Ripple state
var rip1={x:0,y:0,start:0,active:false};
var rip2={x:0,y:0,start:0,active:false};
var lastRipple=0;
var RIPPLE_INTERVAL=16000;
var RIPPLE_DURATION=7000;

function randEdge(){
  var side=Math.floor(Math.random()*4);
  if(side===0) return {x:Math.random(),y:-0.05};
  if(side===1) return {x:Math.random(),y:1.05};
  if(side===2) return {x:-0.05,y:Math.random()};
  return {x:1.05,y:Math.random()};
}

function triggerRipples(now){
  var p1=randEdge();
  rip1.x=p1.x;rip1.y=p1.y;rip1.start=now;rip1.active=true;
  setTimeout(function(){
    var p2={x:p1.x+(Math.random()-.5)*.15,y:p1.y+(Math.random()-.5)*.15};
    rip2.x=p2.x;rip2.y=p2.y;rip2.start=performance.now();rip2.active=true;
  },800);
}

function render(){
  var now=performance.now();
  if(now-lastRipple>RIPPLE_INTERVAL){
    lastRipple=now;
    triggerRipples(now);
  }
  var r1p=rip1.active?Math.min((now-rip1.start)/RIPPLE_DURATION,1.):0.;
  var r2p=rip2.active?Math.min((now-rip2.start)/RIPPLE_DURATION,1.):0.;
  if(r1p>=1.)rip1.active=false;
  if(r2p>=1.)rip2.active=false;

  mouseX+=(mx-mouseX)*.02;
  mouseY+=(my-mouseY)*.02;
  gl.uniform1f(uT,now*.001);
  gl.uniform2f(uM,mouseX,mouseY);
  gl.uniform2f(uR,canvas.width,canvas.height);
  gl.uniform2f(uS,texW,texH);
  gl.uniform3f(uR1,rip1.x,rip1.y,rip1.active?r1p:0.);
  gl.uniform3f(uR2,rip2.x,rip2.y,rip2.active?r2p:0.);
  gl.uniform1i(uX,0);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  requestAnimationFrame(render);
}
render();

document.getElementById("subscribeForm").addEventListener("submit",function(e){
  var msg=document.getElementById("formMsg");
  var btn=this.querySelector("button");
  var inp=this.querySelector("input");
  btn.textContent="...";
  btn.disabled=true;
  setTimeout(function(){
    msg.style.color="rgba(255,255,255,0.7)";
    msg.textContent="You're in. Welcome to Hydraphex.";
    msg.style.opacity="1";
    btn.textContent="Subscribe";
    btn.disabled=false;
    inp.value="";
    setTimeout(function(){msg.style.opacity="0"},4000);
  },1500);
});
